<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- App tile background: deep navy, subtly lit from the top -->
    <linearGradient id="bg" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0%" stop-color="#1c2438"/>
      <stop offset="55%" stop-color="#121724"/>
      <stop offset="100%" stop-color="#0a0d14"/>
    </linearGradient>
    <!-- Top rim highlight that fades toward the bottom (gives the tile depth) -->
    <linearGradient id="rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Chart line gradient -->
    <linearGradient id="line" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e6bff"/>
      <stop offset="60%" stop-color="#3d8bff"/>
      <stop offset="100%" stop-color="#7db4ff"/>
    </linearGradient>
    <!-- Area fill under the line -->
    <linearGradient id="area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e7bff" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#2e7bff" stop-opacity="0"/>
    </linearGradient>
    <!-- Soft glow halo behind the rising line -->
    <radialGradient id="halo" cx="0.62" cy="0.34" r="0.55">
      <stop offset="0%" stop-color="#3d8bff" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#3d8bff" stop-opacity="0"/>
    </radialGradient>
    <!-- Bottom vignette for depth -->
    <radialGradient id="vignette" cx="0.5" cy="0.46" r="0.75">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.35"/>
    </radialGradient>
    <!-- Glow blur for line + endpoint -->
    <filter id="blur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <clipPath id="tile">
      <rect width="256" height="256" rx="56"/>
    </clipPath>
  </defs>

  <!-- Tile -->
  <rect width="256" height="256" rx="56" fill="url(#bg)"/>

  <g clip-path="url(#tile)">
    <!-- Glow halo -->
    <rect width="256" height="256" fill="url(#halo)"/>

    <!-- Volume bars along the bottom (subtle backdrop) -->
    <g opacity="0.85">
      <rect x="40"  y="196" width="15" height="26" rx="3" fill="#1f9d83" opacity="0.55"/>
      <rect x="64"  y="190" width="15" height="32" rx="3" fill="#22a98d" opacity="0.6"/>
      <rect x="88"  y="200" width="15" height="22" rx="3" fill="#d65a52" opacity="0.5"/>
      <rect x="112" y="184" width="15" height="38" rx="3" fill="#26b394" opacity="0.7"/>
      <rect x="136" y="176" width="15" height="46" rx="3" fill="#2bbf9d" opacity="0.78"/>
      <rect x="160" y="168" width="15" height="54" rx="3" fill="#2fc9a4" opacity="0.86"/>
      <rect x="184" y="158" width="15" height="64" rx="3" fill="#34d1ab" opacity="0.95"/>
      <rect x="208" y="150" width="15" height="72" rx="3" fill="#3bd9b2"/>
    </g>

    <!-- Area under the line -->
    <path d="M32 178 L74 150 L116 164 L152 112 L192 86 L226 50 L226 222 L32 222 Z" fill="url(#area)"/>

    <!-- Soft glow copy of the line -->
    <polyline points="32,178 74,150 116,164 152,112 192,86 226,50"
      fill="none" stroke="#3d8bff" stroke-width="9" stroke-linecap="round"
      stroke-linejoin="round" opacity="0.55" filter="url(#blur)"/>

    <!-- Main chart line -->
    <polyline points="32,178 74,150 116,164 152,112 192,86 226,50"
      fill="none" stroke="url(#line)" stroke-width="9"
      stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Endpoint marker -->
    <circle cx="226" cy="50" r="13" fill="#3d8bff" opacity="0.5" filter="url(#blur)"/>
    <circle cx="226" cy="50" r="9" fill="#2e7bff"/>
    <circle cx="226" cy="50" r="3.5" fill="#ffffff"/>

    <!-- Bottom vignette -->
    <rect width="256" height="256" fill="url(#vignette)"/>
  </g>

  <!-- Inner rim highlight -->
  <rect x="1.5" y="1.5" width="253" height="253" rx="54.5" fill="none" stroke="url(#rim)" stroke-width="2.5"/>
</svg>
